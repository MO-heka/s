<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سين جيم - بداية اللعبة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.0/vanilla-tilt.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            /* Deep modern slate */
            --primary-color: #f97316;
            /* Orange-500 from Tailwind for a professional pop */
            --primary-hover: #ea580c;
            --header-bg: rgba(30, 41, 59, 0.7);
            --card-bg: rgba(30, 41, 59, 0.6);
            --text-color: #f8fafc;
            --accent: #334155;
            --selected-border: #10b981;
            /* Emerald-500 */
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        /* 1. Animated Gradient Background */
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(-45deg, #0f172a, #1a1025, #170f1a, #050a15);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            position: relative;
        }

        /* Decorative Background Elements */
        body::before {
            content: '';
            position: absolute;
            top: 20%;
            left: 10%;
            width: 40vw;
            height: 40vw;
            background: radial-gradient(circle, rgba(249, 115, 22, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            filter: blur(60px);
        }

        body::after {
            content: '';
            position: absolute;
            bottom: 10%;
            right: 10%;
            width: 30vw;
            height: 30vw;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.1) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: -1;
            filter: blur(60px);
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }


        .container {
            width: 90%;
            max-width: 1200px;
            margin-top: 2rem;
            margin-bottom: 2rem;
            text-align: center;
        }

        h1 {
            color: var(--text-color);
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            font-weight: 900;
            letter-spacing: -1px;
        }

        h1 span {
            color: var(--primary-color);
        }

        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: #ccc;
        }

        #categories-container {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .category-group {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 24px;
            padding: 2rem;
            border: 1px solid var(--glass-border);
            text-align: right;
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.2), 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .group-title {
            color: #fff;
            font-size: 1.6rem;
            font-weight: 900;
            margin-bottom: 1.5rem;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(249, 115, 22, 0.3);
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
            display: inline-block;
        }

        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
        }

        .category-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1);
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transform-style: preserve-3d;
        }

        .category-card:hover {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
        }

        .category-card.selected {
            border-color: var(--selected-border);
            background-color: rgba(16, 185, 129, 0.05);
            transform: scale(1.02);
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.3);
        }

        .category-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 2px solid var(--glass-border);
            transform: translateZ(20px);
            transition: all 0.3s ease;
        }

        .category-card.selected .category-img {
            opacity: 1;
            /* Keep it clear */
        }

        .category-name {
            color: var(--text-color);
            font-weight: 700;
            padding: 1rem;
            font-size: 1.15rem;
            transform: translateZ(30px);
            text-align: center;
        }

        .selected-badge {
            position: absolute;
            top: 15px;
            right: 15px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.5);
            transform: translateZ(40px) scale(0);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        .category-card.selected .selected-badge {
            transform: translateZ(40px) scale(1);
        }

        .settings-form {
            background-color: var(--header-bg);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        .form-group {
            margin-bottom: 2rem;
            text-align: right;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.8rem;
            font-size: 1.1rem;
            font-weight: 700;
            color: #cbd5e1;
        }

        .form-group input {
            width: 100%;
            padding: 1rem 1.2rem;
            border: 1px solid var(--accent);
            border-radius: 12px;
            background-color: rgba(15, 23, 42, 0.6);
            color: white;
            font-size: 1.1rem;
            font-family: inherit;
            box-sizing: border-box;
            transition: all 0.3s ease;
            outline: none;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .form-group input::placeholder {
            color: #64748b;
        }

        .form-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.2), inset 0 2px 4px rgba(0, 0, 0, 0.2);
            background-color: rgba(15, 23, 42, 0.9);
        }

        .start-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            color: white;
            border: none;
            padding: 1.2rem 3rem;
            font-size: 1.5rem;
            font-weight: 900;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: inherit;
            margin-top: 1.5rem;
            width: 100%;
            box-shadow: 0 10px 25px rgba(249, 115, 22, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .start-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 35px rgba(249, 115, 22, 0.6);
            filter: brightness(1.1);
        }

        .start-btn:active {
            transform: translateY(1px);
        }

        @keyframes pulseBtn {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 123, 63, 0.7);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(255, 123, 63, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 123, 63, 0);
            }
        }

        /* Shake animation for errors */
        @keyframes shake {
            0% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-10px);
            }

            50% {
                transform: translateX(10px);
            }

            75% {
                transform: translateX(-10px);
            }

            100% {
                transform: translateX(0);
            }
        }

        .shake {
            animation: shake 0.4s ease-in-out;
        }

        .selection-count {
            background-color: rgba(30, 41, 59, 0.8);
            padding: 10px 24px;
            border-radius: 30px;
            display: inline-block;
            margin-bottom: 2rem;
            font-weight: bold;
            font-size: 1.2rem;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .selection-count span {
            color: var(--selected-border);
            font-size: 1.5rem;
            padding: 0 5px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>سين <span>جيم</span></h1>
        <p class="subtitle">اختر 6 فئات من الجدول لبدء المنافسة القوية!</p>

        <div class="selection-count">تم اختيار <span id="selected-number">0</span> من 6 فئات</div>

        <div id="categories-container">
            <!-- Categories will be rendered here by JS -->
        </div>

        <div class="settings-form">
            <div class="form-group">
                <label>اسم الفريق الأول</label>
                <input type="text" id="team1" placeholder="مثال: فريق الحيكي" required>
            </div>
            <div class="form-group">
                <label>اسم الفريق الثاني</label>
                <input type="text" id="team2" placeholder="مثال: فريق الميكي" required>
            </div>

            <button class="start-btn" onclick="startGame()">يلا بينا</button>
        </div>
    </div>

    <script>
        const categoryGroups = {
            "⚽️ كرة قدم": [
                { id: 'كاس عالم', name: 'كأس عالم', img: 'كاس عالم.jpeg' },
                { id: 'من هو اللاعب', name: 'من هو اللاعب', img: 'من هو اللاعب.jpg' },
                { id: 'ولا كلمه لاعبين', name: 'ولا كلمة (لاعبين)', img: 'ولا كلمه لاعبين.jpg' },
                { id: 'كرة قدم عالمية', name: 'كرة قدم عالمية', img: 'كرة قدم عالمية.jpg' },
                { id: 'مسيرة اللاعب', name: 'مسيرة اللاعب', img: 'مسيرة اللاعب.jpg' },
                { id: 'خمن اللاعب', name: 'خمن اللاعب', img: 'خمن اللاعب.jpg' }
            ],
            "🎬 ترفيه وفنون": [
                { id: 'فن عربي', name: 'فن عربي', img: 'فن عربي.jpg' },
                { id: 'ولا كلمه فن عربي', name: 'ولا كلمة (فن)', img: 'ولا كلمه فن عربي.jpg' },
                { id: 'مسلسلات رمضان', name: 'مسلسلات رمضان', img: 'مسلسلات رمضان.jpg' },
                { id: 'فن تركي', name: 'فن تركي', img: 'فن تركي.jpg' }
            ],
            "📚 ثقافة وعلوم": [
                { id: 'معلومات عامه', name: 'معلومات عامة', img: 'معلومات عامه.jpg' },
                { id: 'جغرافيا', name: 'جغرافيا', img: 'جغرافيا.jpg' },
                { id: 'تكنولوجيا', name: 'تكنولوجيا', img: 'تكنولوجيا.jpg' },
                { id: 'عالم الحيوان', name: 'عالم الحيوان', img: 'عالم الحيوان.jpg' },
                { id: 'الذكاء', name: 'الذكاء والمنطق', img: 'الذكاء.jpg' }
            ],
            "🌍 دول وأعلام": [
                { id: 'عواصم البلاد', name: 'عواصم البلاد', img: 'عواصم البلاد.jpg' },
                { id: 'اعلام', name: 'أعلام الدول', img: 'اعلام.jpg' },
                { id: 'لون العلم', name: 'لون العلم', img: 'لون العلم.jpg' }
            ],
            "🏆 تاريخ ومهارات": [
                { id: 'حرب العالميه', name: 'حرب عالمية', img: 'حرب العالميه.jpg' },
                { id: 'رسم', name: 'الرسام (تخمين)', img: 'رسم.jpg' }
            ]
        };

        let selectedCategories = [];

        // 4. Sound Engine for start_game.html
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            const now = audioCtx.currentTime;

            if (type === 'click') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
                osc.start(now);
                osc.stop(now + 0.1);
            } else if (type === 'error') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.2);
                gainNode.gain.setValueAtTime(0.2, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
                osc.start(now);
                osc.stop(now + 0.2);
            } else if (type === 'start') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.setValueAtTime(600, now + 0.1);
                osc.frequency.setValueAtTime(800, now + 0.2);
                gainNode.gain.setValueAtTime(0.1, now);
                gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            }
        }

        function renderCategories() {
            const container = document.getElementById('categories-container');
            container.innerHTML = '';

            for (const [groupName, categories] of Object.entries(categoryGroups)) {
                const groupDiv = document.createElement('div');
                groupDiv.className = 'category-group';

                const title = document.createElement('h2');
                title.className = 'group-title';
                title.textContent = groupName;
                groupDiv.appendChild(title);

                const gridDiv = document.createElement('div');
                gridDiv.className = 'categories-grid';

                categories.forEach(cat => {
                    const isSelected = selectedCategories.includes(cat.id);
                    const card = document.createElement('div');
                    card.className = `category-card ${isSelected ? 'selected' : ''}`;
                    card.onclick = () => toggleCategory(cat.id);

                    card.innerHTML = `
                        <div class="selected-badge">✓</div>
                        <img src="${cat.img}" alt="${cat.name}" class="category-img" onerror="this.src='https://via.placeholder.com/180x150?text=No+Image'">
                        <div class="category-name">${cat.name}</div>
                    `;
                    gridDiv.appendChild(card);
                });

                groupDiv.appendChild(gridDiv);
                container.appendChild(groupDiv);
            }

            document.getElementById('selected-number').textContent = selectedCategories.length;

            // Re-initialize VanillaTilt for new elements
            VanillaTilt.init(document.querySelectorAll(".category-card"), {
                max: 15,
                speed: 400,
                glare: true,
                "max-glare": 0.3
            });
        }

        function toggleCategory(categoryId) {
            playSound('click');
            if (selectedCategories.includes(categoryId)) {
                selectedCategories = selectedCategories.filter(id => id !== categoryId);
            } else {
                if (selectedCategories.length >= 6) {
                    playSound('error');
                    Swal.fire({
                        icon: 'warning',
                        title: 'عذراً',
                        text: 'لقد اخترت الحد الأقصى (6 فئات)! قم بإلغاء تحديد فئة لاختيار أخرى.',
                        confirmButtonColor: '#ff7b3f'
                    });
                    return;
                }
                selectedCategories.push(categoryId);
            }
            renderCategories();
        }

        function triggerError(message) {
            playSound('error');
            const form = document.querySelector('.settings-form');
            form.classList.add('shake');
            setTimeout(() => form.classList.remove('shake'), 400);
            Swal.fire({
                icon: 'error',
                title: 'خطأ',
                text: message,
                confirmButtonColor: '#ff7b3f'
            });
        }

        function startGame() {
            const team1 = document.getElementById('team1').value.trim();
            const team2 = document.getElementById('team2').value.trim();

            if (selectedCategories.length !== 6) {
                return triggerError('الرجاء اختيار 6 فئات بدقة للبدء!');
            }
            if (!team1 || !team2) {
                return triggerError('الرجاء إدخال أسماء الفريقين!');
            }

            playSound('start');

            const gameConfig = {
                categories: selectedCategories,
                team1: { name: team1, score: 0, lifelines: { phone: 1, double: 1, skip: 1 } },
                team2: { name: team2, score: 0, lifelines: { phone: 1, double: 1, skip: 1 } },
                timer: 0,
                currentTurn: 'team1', // Start with team 1
                playedQuestions: {} // format: "category_points_side": true
            };

            localStorage.setItem('sinjim_config', JSON.stringify(gameConfig));

            // Add slight delay to hear the start sound
            document.querySelector('.start-btn').innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري البدء...';
            setTimeout(() => {
                window.location.href = 'سين جيم.html';
            }, 600);
        }

        // Initialize
        renderCategories();
    </script>
</body>

</html>
